services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: upi_mssql
    env_file:
      - ../.env
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${MSSQL_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    restart: unless-stopped

volumes:
  mssql_data: